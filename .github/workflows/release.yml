name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Optional release tag/version (examples: v1.2.3 or 1.2.3)"
        required: false
        type: string
  issue_comment:
    types: [created]

concurrency:
  group: release-manual
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: read
  issues: read

jobs:
  release:
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' || (
        github.event_name == 'issue_comment' &&
        github.event.issue.pull_request &&
        startsWith(github.event.comment.body, '/release') &&
        (github.event.comment.author_association == 'OWNER' ||
         github.event.comment.author_association == 'MEMBER' ||
         github.event.comment.author_association == 'COLLABORATOR')
      )

    steps:
      - name: Resolve release target and command inputs
        id: context
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "target_sha=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
            echo "requested_tag=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
            echo "source=workflow_dispatch" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          COMMENT_BODY='${{ github.event.comment.body }}'
          if [[ ! "$COMMENT_BODY" =~ ^/release([[:space:]]+([^[:space:]]+))?[[:space:]]*$ ]]; then
            echo "Not a /release command; skipping."
            exit 1
          fi

          REQUESTED_TAG="${BASH_REMATCH[2]}"
          PR_NUMBER='${{ github.event.issue.number }}'
          TARGET_SHA=$(gh api "repos/${{ github.repository }}/pulls/${PR_NUMBER}" --jq '.head.sha')

          echo "target_sha=${TARGET_SHA}" >> "$GITHUB_OUTPUT"
          echo "requested_tag=${REQUESTED_TAG}" >> "$GITHUB_OUTPUT"
          echo "source=issue_comment" >> "$GITHUB_OUTPUT"

      - name: Checkout with full history and tags
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true
          ref: ${{ steps.context.outputs.target_sha }}

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Resolve release tag/version
        id: version
        run: |
          REQUESTED_TAG="${{ steps.context.outputs.requested_tag }}"
          TARGET_SHA="${{ steps.context.outputs.target_sha }}"

          if [ -n "$REQUESTED_TAG" ]; then
            if [[ "$REQUESTED_TAG" =~ ^v?[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              [[ "$REQUESTED_TAG" == v* ]] || REQUESTED_TAG="v${REQUESTED_TAG}"
              NEXT_TAG="$REQUESTED_TAG"
            else
              echo "Invalid requested tag: '$REQUESTED_TAG'. Use vX.Y.Z or X.Y.Z." >&2
              exit 1
            fi
          else
            EXISTING_TAG=$(git tag --points-at "$TARGET_SHA" --list 'v*' | head -n1)
            if [ -n "$EXISTING_TAG" ]; then
              NEXT_TAG="$EXISTING_TAG"
              echo "Reusing existing tag on target commit: ${NEXT_TAG}"
            else
              LATEST_TAG=$(git tag --list 'v*' --sort=-version:refname | head -n1)
              if [ -z "$LATEST_TAG" ]; then
                NEXT_TAG="v0.0.1"
              elif [[ "$LATEST_TAG" =~ ^v([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
                MAJOR="${BASH_REMATCH[1]}"
                MINOR="${BASH_REMATCH[2]}"
                PATCH="${BASH_REMATCH[3]}"
                NEXT_PATCH=$((PATCH + 1))
                NEXT_TAG="v${MAJOR}.${MINOR}.${NEXT_PATCH}"
              else
                echo "Latest tag '${LATEST_TAG}' is non-semver; falling back to v0.0.1"
                NEXT_TAG="v0.0.1"
              fi
            fi
          fi

          VERSION_NAME="${NEXT_TAG#v}"
          echo "tag=${NEXT_TAG}" >> "$GITHUB_OUTPUT"
          echo "version_name=${VERSION_NAME}" >> "$GITHUB_OUTPUT"
          echo "Resolved release tag: ${NEXT_TAG}"

      - name: Create and push release tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          TARGET_SHA="${{ steps.context.outputs.target_sha }}"
          TAG="${{ steps.version.outputs.tag }}"

          if git rev-parse "${TAG}" >/dev/null 2>&1; then
            echo "Tag ${TAG} already exists; skipping creation."
          else
            git tag "${TAG}" "${TARGET_SHA}"
            git push origin "${TAG}"
          fi

      - name: Validate signing secrets
        run: |
          if [ -z "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" ]; then
            echo "ERROR: Secret ANDROID_KEYSTORE_BASE64 is not set." >&2
            exit 1
          fi
          if [ -z "${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" ]; then
            echo "ERROR: Secret ANDROID_KEYSTORE_PASSWORD is not set." >&2
            exit 1
          fi
          if [ -z "${{ secrets.ANDROID_KEY_ALIAS }}" ]; then
            echo "ERROR: Secret ANDROID_KEY_ALIAS is not set." >&2
            exit 1
          fi
          if [ -z "${{ secrets.ANDROID_KEY_PASSWORD }}" ]; then
            echo "ERROR: Secret ANDROID_KEY_PASSWORD is not set." >&2
            exit 1
          fi

      - name: Decode keystore to temporary file
        run: |
          KEYSTORE_PATH="${RUNNER_TEMP}/release.keystore"
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > "$KEYSTORE_PATH"
          echo "KEYSTORE_PATH=${KEYSTORE_PATH}" >> "$GITHUB_ENV"

      - name: Ensure Gradle wrapper is executable
        run: chmod +x ./gradlew

      - name: Build signed release APK
        env:
          ANDROID_SIGNING_STORE_FILE: ${{ env.KEYSTORE_PATH }}
          ANDROID_SIGNING_STORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_SIGNING_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_SIGNING_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          VERSION_NAME: ${{ steps.version.outputs.version_name }}
          VERSION_CODE: ${{ github.run_number }}
        run: ./gradlew :app:assembleRelease --no-daemon

      - name: Verify APK exists
        run: |
          APK_PATH="app/build/outputs/apk/release/stubio-${{ steps.version.outputs.version_name }}.apk"
          if [ ! -f "$APK_PATH" ]; then
            echo "ERROR: Expected APK not found at ${APK_PATH}" >&2
            echo "Contents of app/build/outputs/apk/release (if it exists):"
            ls -la "app/build/outputs/apk/release" 2>/dev/null || true
            exit 1
          fi
          echo "APK_PATH=${APK_PATH}" >> "$GITHUB_ENV"
          echo "Found APK: ${APK_PATH}"

      - name: Verify APK is signed
        run: |
          APKSIGNER=""
          if [ -d "$ANDROID_SDK_ROOT/build-tools" ]; then
            LATEST_BT=$(ls -1 "$ANDROID_SDK_ROOT/build-tools" | \
              awk -F. '{printf "%05d%05d%05d %s\n", $1, $2, $3, $0}' | \
              sort -k1,1n | tail -n1 | awk '{print $2}')
            if [ -n "$LATEST_BT" ] && [ -x "$ANDROID_SDK_ROOT/build-tools/$LATEST_BT/apksigner" ]; then
              APKSIGNER="$ANDROID_SDK_ROOT/build-tools/$LATEST_BT/apksigner"
            fi
          fi
          if [ -n "$APKSIGNER" ]; then
            "$APKSIGNER" verify --verbose "$APK_PATH"
          else
            echo "apksigner not found; skipping signature verification"
          fi

      - name: Create GitHub Release and attach APK
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          target_commitish: ${{ steps.context.outputs.target_sha }}
          generate_release_notes: true
          files: ${{ env.APK_PATH }}

      - name: Upload APK as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: stubio-${{ steps.version.outputs.tag }}-release
          path: ${{ env.APK_PATH }}
          retention-days: 30
