name: Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Optional release tag/version (examples: v1.2.3 or 1.2.3)"
        required: false
        type: string
      draft:
        description: "Create/update the GitHub Release as draft"
        required: false
        type: boolean
        default: false
  issue_comment:
    types: [created]

concurrency:
  group: release-manual
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: read
  issues: read

jobs:
  release:
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' || (
        github.event_name == 'issue_comment' &&
        github.event.issue.pull_request &&
        startsWith(github.event.comment.body, '/release') &&
        (github.event.comment.author_association == 'OWNER' ||
         github.event.comment.author_association == 'MEMBER' ||
         github.event.comment.author_association == 'COLLABORATOR')
      )

    steps:
      - name: Resolve release target and command inputs
        id: context
        env:
          GH_TOKEN: ${{ github.token }}
          COMMENT_BODY: ${{ github.event.comment.body }}
        run: |
          set -euo pipefail

          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "target_sha=${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
            echo "requested_tag=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
            echo "draft=${{ github.event.inputs.draft && 'true' || 'false' }}" >> "$GITHUB_OUTPUT"
            echo "source=workflow_dispatch" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          COMMAND_PAYLOAD="${COMMENT_BODY#/release}"
          REQUESTED_TAG=""
          IS_DRAFT="false"

          for token in $COMMAND_PAYLOAD; do
            case "$token" in
              --draft)
                IS_DRAFT="true"
                ;;
              --*)
                echo "Ignoring unknown flag '$token'. Supported flag: --draft"
                ;;
              *)
                if [ -z "$REQUESTED_TAG" ]; then
                  REQUESTED_TAG="$token"
                else
                  echo "Ignoring extra argument '$token'."
                fi
                ;;
            esac
          done

          PR_NUMBER='${{ github.event.issue.number }}'
          TARGET_SHA=$(gh api "repos/${{ github.repository }}/pulls/${PR_NUMBER}" --jq '.head.sha')

          echo "target_sha=${TARGET_SHA}" >> "$GITHUB_OUTPUT"
          echo "requested_tag=${REQUESTED_TAG}" >> "$GITHUB_OUTPUT"
          echo "draft=${IS_DRAFT}" >> "$GITHUB_OUTPUT"
          echo "source=issue_comment" >> "$GITHUB_OUTPUT"

      - name: Initialize adaptive report
        run: |
          : > "${RUNNER_TEMP}/adaptive-report.md"

      - name: Checkout with full history and tags
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true
          ref: ${{ steps.context.outputs.target_sha }}

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install required Android SDK packages
        run: |
          set -euo pipefail
          if command -v sdkmanager >/dev/null 2>&1; then
            yes | sdkmanager --licenses >/dev/null || true
            sdkmanager --install "platform-tools" "platforms;android-35" "build-tools;35.0.0"
          else
            echo "sdkmanager is unavailable; proceeding with preinstalled Android SDK packages if present."
          fi

      - name: Resolve release tag/version
        id: version
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          REQUESTED_TAG="${{ steps.context.outputs.requested_tag }}"
          TARGET_SHA="${{ steps.context.outputs.target_sha }}"

          git fetch --force --tags origin

          is_semver_tag() {
            local tag="$1"
            [[ "$tag" =~ ^v([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]
          }

          normalise_semver_tag() {
            local tag="$1"
            [[ "$tag" == v* ]] || tag="v$tag"
            if is_semver_tag "$tag"; then
              echo "$tag"
              return 0
            fi
            return 1
          }

          semver_key() {
            local tag="$1"
            if [[ "$tag" =~ ^v([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
              printf "%05d%05d%05d\n" "${BASH_REMATCH[1]}" "${BASH_REMATCH[2]}" "${BASH_REMATCH[3]}"
            else
              printf "000000000000000\n"
            fi
          }

          sort_semver_tags() {
            local tags=()
            while read -r line; do
              if [ -n "$line" ] && is_semver_tag "$line"; then
                tags+=("$line")
              fi
            done
            if [ ${#tags[@]} -eq 0 ]; then
              return 0
            fi
            for t in "${tags[@]}"; do
              echo "$(semver_key "$t") $t"
            done | sort -r | awk '{print $2}'
          }

          bump_patch() {
            local tag="$1"
            if [[ "$tag" =~ ^v([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
              echo "v${BASH_REMATCH[1]}.${BASH_REMATCH[2]}.$((BASH_REMATCH[3] + 1))"
            fi
          }

          get_release_inventory() {
            gh release list --json tagName,isDraft,isPrerelease,publishedAt --limit 1000 2>/dev/null || echo "[]"
          }

          # Inventory outputs
          HIGHEST_PUB=""
          HIGHEST_DRAFT=""
          HIGHEST_PRE=""
          HIGHEST_RAW=""
          SKIPPED_TAGS=""

          # 1. Releases JSON
          RELEASES_JSON=$(get_release_inventory)

          # Parse Highest Published
          PUB_TAGS=$(echo "$RELEASES_JSON" | jq -r '.[] | select(.isDraft == false and .isPrerelease == false) | .tagName')
          HIGHEST_PUB=$(echo "$PUB_TAGS" | sort_semver_tags | head -n1 || true)

          # Parse Highest Draft
          DRAFT_TAGS=$(echo "$RELEASES_JSON" | jq -r '.[] | select(.isDraft == true) | .tagName')
          HIGHEST_DRAFT=$(echo "$DRAFT_TAGS" | sort_semver_tags | head -n1 || true)

          # Parse Highest Prerelease
          PRE_TAGS=$(echo "$RELEASES_JSON" | jq -r '.[] | select(.isPrerelease == true) | .tagName')
          HIGHEST_PRE=$(echo "$PRE_TAGS" | sort_semver_tags | head -n1 || true)

          # Track skipped non-semver from releases
          NON_SEMVER_REL=$(echo "$RELEASES_JSON" | jq -r '.[].tagName' | while read -r t; do
            if [ -n "$t" ] && ! is_semver_tag "$t"; then echo "$t"; fi
          done)
          if [ -n "$NON_SEMVER_REL" ]; then
            SKIPPED_TAGS="$NON_SEMVER_REL"
          fi

          # 2. Git Tags
          ALL_GIT_TAGS=$(git tag --list 'v*')
          HIGHEST_RAW=$(echo "$ALL_GIT_TAGS" | sort_semver_tags | head -n1 || true)

          NON_SEMVER_GIT=$(echo "$ALL_GIT_TAGS" | while read -r t; do
            if [ -n "$t" ] && ! is_semver_tag "$t"; then echo "$t"; fi
          done)
          if [ -n "$NON_SEMVER_GIT" ]; then
            SKIPPED_TAGS=$(echo -e "${SKIPPED_TAGS}\n${NON_SEMVER_GIT}" | sort -u | grep -v '^$')
          fi

          # Highest Overall
          HIGHEST_ALL=$(echo -e "${HIGHEST_PUB}\n${HIGHEST_DRAFT}\n${HIGHEST_PRE}\n${HIGHEST_RAW}" | sort_semver_tags | head -n1 || true)

          CANDIDATE_TAG=""
          TAG_NOTE=""
          BUMP_COUNT=0
          TAG_ACTION="new tag"

          if [ -n "$REQUESTED_TAG" ]; then
            # Explicit Tag Mode
            NORM_TAG=$(normalise_semver_tag "$REQUESTED_TAG" || true)
            if [ -z "$NORM_TAG" ]; then
              echo "ERROR: Requested tag '$REQUESTED_TAG' is invalid semver. Failing in explicit mode." >&2
              exit 1
            fi

            CANDIDATE_TAG="$NORM_TAG"
            echo "Explicit tag requested: ${CANDIDATE_TAG}"
            TAG_NOTE="Requested tag ${CANDIDATE_TAG} accepted."

            if git show-ref --verify --quiet "refs/tags/${CANDIDATE_TAG}"; then
              TAG_SHA=$(git rev-list -n1 "${CANDIDATE_TAG}")
              if [ "$TAG_SHA" = "$TARGET_SHA" ]; then
                echo "Tag ${CANDIDATE_TAG} already exists on target commit. Proceeding to update/reuse release."
                TAG_NOTE="Requested tag ${CANDIDATE_TAG} already exists on target commit. Reusing."
                TAG_ACTION="existing tag reuse/update"
              else
                echo "ERROR: Explicit tag ${CANDIDATE_TAG} exists but points to a different commit (${TAG_SHA} != ${TARGET_SHA}). Failing." >&2
                exit 1
              fi
            fi
            NEXT_TAG="$CANDIDATE_TAG"
          else
            # Auto Tag Mode
            if [ -z "$HIGHEST_ALL" ]; then
              NEXT_TAG="v0.0.1"
              TAG_NOTE="No valid semver tags found in repo. Starting at v0.0.1."
            else
              NEXT_TAG=$(bump_patch "$HIGHEST_ALL")
              TAG_NOTE="Auto-generated next semantic tag based on highest existing version ${HIGHEST_ALL}."
              TAG_ACTION="auto-bumped new release"
            fi

            # Collision retry loop for auto mode
            ATTEMPTS=0
            while :; do
              ATTEMPTS=$((ATTEMPTS + 1))
              if [ "$ATTEMPTS" -gt 200 ]; then
                echo "Could not find an available tag after 200 attempts starting from ${NEXT_TAG}." >&2
                exit 1
              fi

              if git show-ref --verify --quiet "refs/tags/${NEXT_TAG}"; then
                echo "Tag ${NEXT_TAG} already exists; bumping patch and retrying."
                NEXT_TAG=$(bump_patch "$NEXT_TAG")
                BUMP_COUNT=$((BUMP_COUNT + 1))
                continue
              fi
              break
            done
          fi

          VERSION_NAME="${NEXT_TAG#v}"

          # Pass outputs to summary & later steps
          echo "tag=${NEXT_TAG}" >> "$GITHUB_OUTPUT"
          echo "version_name=${VERSION_NAME}" >> "$GITHUB_OUTPUT"
          echo "tag_bump_count=${BUMP_COUNT}" >> "$GITHUB_OUTPUT"
          echo "tag_note=${TAG_NOTE}" >> "$GITHUB_OUTPUT"
          echo "highest_pub=${HIGHEST_PUB:-none}" >> "$GITHUB_OUTPUT"
          echo "highest_draft=${HIGHEST_DRAFT:-none}" >> "$GITHUB_OUTPUT"
          echo "highest_pre=${HIGHEST_PRE:-none}" >> "$GITHUB_OUTPUT"
          echo "highest_raw=${HIGHEST_RAW:-none}" >> "$GITHUB_OUTPUT"

          # Clean SKIPPED_TAGS formatting
          SKIPPED_FMT=$(echo "$SKIPPED_TAGS" | tr '\n' ',' | sed 's/,$//')
          echo "skipped_tags=${SKIPPED_FMT:-none}" >> "$GITHUB_OUTPUT"

          NORM_REQ=$(normalise_semver_tag "$REQUESTED_TAG" 2>/dev/null || true)
          echo "norm_req=${NORM_REQ:-none}" >> "$GITHUB_OUTPUT"
          echo "tag_action=${TAG_ACTION}" >> "$GITHUB_OUTPUT"

          echo "Resolved release tag: ${NEXT_TAG}"

      - name: Resolve signing mode
        id: signing
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          set -euo pipefail

          missing=0
          for secret_name in ANDROID_KEYSTORE_BASE64 ANDROID_KEYSTORE_PASSWORD ANDROID_KEY_ALIAS ANDROID_KEY_PASSWORD; do
            if [ -z "${!secret_name}" ]; then
              echo "Missing secret: ${secret_name}"
              missing=$((missing + 1))
            fi
          done

          if [ "$missing" -eq 0 ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
            echo "Signing is enabled."
            echo "- ✅ Signing enabled (all secrets present)." >> "${RUNNER_TEMP}/adaptive-report.md"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "Signing secrets are incomplete (${missing} missing). Falling back to unsigned release build."
            echo "- ⚠️ Signing fallback: built unsigned APK because ${missing} signing secret(s) were missing." >> "${RUNNER_TEMP}/adaptive-report.md"
          fi

      - name: Decode keystore to temporary file
        if: steps.signing.outputs.enabled == 'true'
        run: |
          set -euo pipefail

          KEYSTORE_PATH="${RUNNER_TEMP}/release.keystore"
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > "$KEYSTORE_PATH"
          echo "KEYSTORE_PATH=${KEYSTORE_PATH}" >> "$GITHUB_ENV"

      - name: Ensure Gradle wrapper is executable
        run: chmod +x ./gradlew

      - name: Set up Gradle cache
        uses: gradle/actions/setup-gradle@v4

      - name: Run release lint
        run: ./gradlew :app:lintRelease --no-daemon

      - name: Upload release lint report
        if: always()
        id: lint_upload
        uses: actions/upload-artifact@v4
        with:
          name: lint-report-release-${{ steps.version.outputs.tag }}
          path: app/build/reports/lint-results-release.html
          if-no-files-found: ignore
          retention-days: 60

      - name: Build signed release APK
        if: steps.signing.outputs.enabled == 'true'
        env:
          ANDROID_SIGNING_STORE_FILE: ${{ env.KEYSTORE_PATH }}
          ANDROID_SIGNING_STORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_SIGNING_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_SIGNING_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          VERSION_NAME: ${{ steps.version.outputs.version_name }}
          VERSION_CODE: ${{ github.run_number }}
        run: ./gradlew :app:assembleRelease --no-daemon

      - name: Build unsigned release APK (fallback)
        if: steps.signing.outputs.enabled != 'true'
        env:
          VERSION_NAME: ${{ steps.version.outputs.version_name }}
          VERSION_CODE: ${{ github.run_number }}
        run: ./gradlew :app:assembleRelease --no-daemon

      - name: Rename APK to release naming convention
        id: apk
        run: |
          set -euo pipefail

          TAG="${{ steps.version.outputs.tag }}"
          APK_TAG_SLUG="${TAG//./-}"

          if [ "${{ steps.signing.outputs.enabled }}" = "true" ]; then
            SUFFIX=""
          else
            SUFFIX="-unsigned"
          fi

          FINAL_APK_NAME="stubio-${APK_TAG_SLUG}${SUFFIX}.apk"

          FOUND_APK=$(find app/build/outputs/apk/release -maxdepth 1 -type f -name '*.apk' | head -n1 || true)
          if [ -z "$FOUND_APK" ]; then
            echo "ERROR: No APK file found under app/build/outputs/apk/release." >&2
            ls -la "app/build/outputs/apk/release" 2>/dev/null || true
            exit 1
          fi

          DEST_PATH="app/build/outputs/apk/release/${FINAL_APK_NAME}"
          mv "$FOUND_APK" "$DEST_PATH"

          echo "APK_PATH=${DEST_PATH}" >> "$GITHUB_ENV"
          echo "Renamed APK to: ${DEST_PATH}"

      - name: Verify APK is signed
        if: steps.signing.outputs.enabled == 'true'
        run: |
          set -euo pipefail

          APKSIGNER=""
          if [ -d "$ANDROID_SDK_ROOT/build-tools" ]; then
            LATEST_BT=$(ls -1 "$ANDROID_SDK_ROOT/build-tools" | \
              awk -F. '{printf "%05d%05d%05d %s\n", $1, $2, $3, $0}' | \
              sort -k1,1n | tail -n1 | awk '{print $2}')
            if [ -n "$LATEST_BT" ] && [ -x "$ANDROID_SDK_ROOT/build-tools/$LATEST_BT/apksigner" ]; then
              APKSIGNER="$ANDROID_SDK_ROOT/build-tools/$LATEST_BT/apksigner"
            fi
          fi

          if [ -z "$APKSIGNER" ] && command -v apksigner >/dev/null 2>&1; then
            APKSIGNER="$(command -v apksigner)"
          fi

          if [ -n "$APKSIGNER" ]; then
            "$APKSIGNER" verify --verbose "$APK_PATH"
          else
            echo "apksigner not found; skipping signature verification even though signing was enabled."
            echo "- ⚠️ Signature verification fallback: apksigner missing; build continued." >> "${RUNNER_TEMP}/adaptive-report.md"
          fi

      - name: Prepare release notes body
        id: notes
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          TAG="${{ steps.version.outputs.tag }}"
          TAG="${TAG:-(unknown)}"
          TARGET_SHA="${{ steps.context.outputs.target_sha }}"
          TARGET_SHA="${TARGET_SHA:-(unknown)}"

          if [ "${{ steps.version.outputs.tag_bump_count }}" != "0" ]; then
            echo "- ⚠️ Tag adaptation: bumped patch ${{ steps.version.outputs.tag_bump_count }} time(s) to avoid collisions." >> "${RUNNER_TEMP}/adaptive-report.md"
          else
            echo "- ✅ Tag selection: no collision bump needed." >> "${RUNNER_TEMP}/adaptive-report.md"
          fi
          echo "- ℹ️ Tag strategy: ${{ steps.version.outputs.tag_note }}" >> "${RUNNER_TEMP}/adaptive-report.md"

          # Find the most recent active published (non-draft, non-prerelease) release tag
          # that is also a valid semver so the changelog compares against the correct base rather than any tag.
          PREV_TAG="${{ steps.version.outputs.highest_pub }}"
          if [ "$PREV_TAG" = "none" ] || [ -z "$PREV_TAG" ]; then
            PREV_TAG=""
          fi
          echo "previous_tag_name=${PREV_TAG:-none}" >> "$GITHUB_OUTPUT"

          GENERATED_NOTES=""
          if [ "$TAG" != "(unknown)" ] && [ "$TARGET_SHA" != "(unknown)" ]; then
            GENERATE_ARGS=(-f "tag_name=${TAG}" -f "target_commitish=${TARGET_SHA}")
            [ -n "$PREV_TAG" ] && GENERATE_ARGS+=(-f "previous_tag_name=${PREV_TAG}")
            GENERATED_NOTES=$(gh api "repos/${{ github.repository }}/releases/generate-notes" \
              "${GENERATE_ARGS[@]}" \
              --jq '.body' 2>/dev/null || true)
          fi

          # Strip the "## What's Changed" heading (replaced below with emoji variant).
          # Reformat PR/commit bullet lines from GitHub's default:
          #   "* title by @user in URL"  →  "[»](URL) title by @user"
          PROCESSED=$(echo "$GENERATED_NOTES" | \
            sed "/^## What's Changed/d" | \
            sed -E 's|^\* (.+) in (https://[^ ]+)$|[»](\2) \1|' || true)

          {
            echo "## 🔄 What's Changed"
            echo ""
            echo "$PROCESSED"
          } > "${RUNNER_TEMP}/release-body.md"

          echo "release_body_path=${RUNNER_TEMP}/release-body.md" >> "$GITHUB_OUTPUT"

      - name: Verify APK exists before release
        run: |
          set -euo pipefail
          if [ ! -f "${APK_PATH}" ]; then
            echo "ERROR: APK file not found at ${APK_PATH}. Aborting release creation to avoid orphan tags." >&2
            exit 1
          fi

      - name: Create and push release tag
        run: |
          set -euo pipefail

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          TARGET_SHA="${{ steps.context.outputs.target_sha }}"
          TAG="${{ steps.version.outputs.tag }}"

          if git show-ref --verify --quiet "refs/tags/${TAG}"; then
            TAG_SHA=$(git rev-list -n1 "${TAG}")
            if [ "$TAG_SHA" = "$TARGET_SHA" ]; then
              echo "Tag ${TAG} already exists on target commit; skipping creation."
              exit 0
            fi
            echo "Tag ${TAG} now points to ${TAG_SHA} (race condition). Keeping existing tag and continuing without push."
            exit 0
          fi

          ATTEMPTS=0
          MAX_ATTEMPTS=5
          while :; do
            ATTEMPTS=$((ATTEMPTS + 1))
            git tag "${TAG}" "${TARGET_SHA}" || true
            if git push origin "${TAG}"; then
              break
            fi

            echo "Tag push failed for ${TAG}. Attempt ${ATTEMPTS}/${MAX_ATTEMPTS}."
            git fetch --force --tags origin
            if git show-ref --verify --quiet "refs/tags/${TAG}"; then
              TAG_SHA=$(git rev-list -n1 "${TAG}")
              if [ "$TAG_SHA" = "$TARGET_SHA" ]; then
                echo "Tag ${TAG} is now present on target commit after push race; continuing."
                exit 0
              fi
            fi

            if [ "$ATTEMPTS" -ge "$MAX_ATTEMPTS" ]; then
              echo "ERROR: Could not push tag ${TAG} after ${MAX_ATTEMPTS} attempts; giving up." >&2
              exit 1
            fi

            # If explicit mode, do not auto-bump, fail immediately on collision
            if [ "${{ steps.context.outputs.requested_tag }}" != "" ]; then
              echo "ERROR: Collision detected during explicit tag mode. Aborting." >&2
              exit 1
            fi

            # Auto bump patch and retry loop
            if [[ "$TAG" =~ ^v([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
              TAG="v${BASH_REMATCH[1]}.${BASH_REMATCH[2]}.$((BASH_REMATCH[3] + 1))"
              echo "Bumping to ${TAG} and retrying push..."
            else
              echo "ERROR: Current tag ${TAG} is not standard semver; cannot auto-bump." >&2
              exit 1
            fi
          done

          # Since the tag might have changed due to remote collisions, update the output for later steps.
          # We cannot easily update the GITHUB_OUTPUT of a previous step dynamically here,
          # so we export it as an env variable that takes precedence or update the current step's output.
          echo "final_tag=${TAG}" >> "$GITHUB_ENV"
          # Also write to github output if needed for completeness
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release and attach APK
        id: release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.final_tag || steps.version.outputs.tag }}
          target_commitish: ${{ steps.context.outputs.target_sha }}
          draft: ${{ steps.context.outputs.draft == 'true' }}
          body_path: ${{ steps.notes.outputs.release_body_path }}
          append_body: false
          generate_release_notes: false
          make_latest: ${{ steps.context.outputs.draft != 'true' && 'true' || 'false' }}
          fail_on_unmatched_files: true
          overwrite_files: true
          files: ${{ env.APK_PATH }}

      - name: Verify release result
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          TAG="${final_tag:-${{ steps.version.outputs.tag }}}"

          # Check if release exists
          if ! gh release view "${TAG}" >/dev/null 2>&1; then
            echo "ERROR: GitHub release for tag ${TAG} could not be verified." >&2
            exit 1
          fi

          # Check if APK is attached
          APK_NAME=$(basename "${APK_PATH}")
          ASSETS=$(gh release view "${TAG}" --json assets --jq '.assets[].name')
          if ! echo "$ASSETS" | grep -q "^${APK_NAME}$"; then
            echo "ERROR: Expected APK asset '${APK_NAME}' is not attached to the release." >&2
            exit 1
          fi

          # Check if URL resolves correctly
          RELEASE_URL=$(gh release view "${TAG}" --json url --jq '.url' || echo "")
          if [ -z "$RELEASE_URL" ] || echo "$RELEASE_URL" | grep -q 'untagged-'; then
            echo "WARNING: Release URL could not be perfectly resolved or appears untagged: ${RELEASE_URL}" >&2
          else
            echo "Release verified successfully at ${RELEASE_URL}"
          fi

      - name: Upload APK as workflow artifact
        id: apk_upload
        uses: actions/upload-artifact@v4
        with:
          name: stubio-${{ env.final_tag || steps.version.outputs.tag }}-release
          path: ${{ env.APK_PATH }}
          retention-days: 30

      - name: Publish run summary
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          REPO_BASE_URL: ${{ github.server_url }}/${{ github.repository }}
        run: |
          set -euo pipefail

          TAG="${final_tag:-${{ steps.version.outputs.tag }}}"
          TAG="${TAG:-(unknown)}"
          TARGET_SHA="${{ steps.context.outputs.target_sha }}"
          TARGET_SHA="${TARGET_SHA:-(unknown)}"
          DRAFT="${{ steps.context.outputs.draft }}"
          DRAFT="${DRAFT:-(unknown)}"
          SOURCE="${{ steps.context.outputs.source }}"
          SOURCE="${SOURCE:-(unknown)}"
          SIGNING_ENABLED="${{ steps.signing.outputs.enabled }}"
          SIGNING_ENABLED="${SIGNING_ENABLED:-(unknown)}"
          APK_PATH_VAL="${{ env.APK_PATH }}"
          APK_PATH_VAL="${APK_PATH_VAL:-(unavailable)}"

          # Percent-encode the first character of the repository-name path segment.
          # This prevents GitHub's built-in secret masker from redacting the repo name
          # when it coincidentally matches a registered secret value.
          # Browsers decode percent-encoded characters before resolving, so links work.
          _safe_repo_url() {
            local url="$1"
            local repo_name="${GITHUB_REPOSITORY#*/}"
            if [ -z "$repo_name" ] || [ -z "$url" ]; then
              printf '%s' "$url"
              return
            fi
            local char_code encoded_first
            # LC_ALL=C ensures consistent byte-value interpretation across locales.
            # GitHub repo names are restricted to [a-zA-Z0-9._-] so a literal '
            # in the repo name is not possible and the printf 'char trick is safe.
            char_code=$(LC_ALL=C printf '%d' "'${repo_name:0:1}")
            encoded_first=$(printf '%%%02X' "$char_code")
            # Replace only the first occurrence (the /owner/repo/ path segment).
            printf '%s' "${url/$repo_name/${encoded_first}${repo_name:1}}"
          }

          # Prefer the URL returned by the release API (handles draft placeholder URLs).
          RELEASE_URL=""
          if [ "$TAG" != "(unknown)" ]; then
            RELEASE_URL=$(gh release view "${TAG}" --json url --jq '.url' 2>/dev/null || true)
          fi
          # Fall back to the action output if gh CLI lookup failed or returned untagged URL.
          if [ -z "$RELEASE_URL" ] || echo "$RELEASE_URL" | grep -q 'untagged-'; then
            RELEASE_URL="${{ steps.release.outputs.url }}"
          fi
          RELEASE_URL="${RELEASE_URL:-(unavailable)}"
          [ "$RELEASE_URL" != "(unavailable)" ] && RELEASE_URL=$(_safe_repo_url "$RELEASE_URL")

          LINT_URL="${{ steps.lint_upload.outputs.artifact-url }}"
          LINT_URL="${LINT_URL:-(unavailable)}"
          [ "$LINT_URL" != "(unavailable)" ] && LINT_URL=$(_safe_repo_url "$LINT_URL")

          TAG_URL=""
          TAGGED_TREE_URL=""
          if [ "$TAG" != "(unknown)" ]; then
            TAG_URL=$(_safe_repo_url "${REPO_BASE_URL}/releases/tag/${TAG}")
            TAGGED_TREE_URL=$(_safe_repo_url "${REPO_BASE_URL}/tree/${TAG}")
          fi

          {
            echo "## 🚀 Release Workflow Summary"
            echo ""
            echo "### 1. Overall Status"
            echo "| Field | Value |"
            echo "|-------|-------|"
            if [ "${{ job.status }}" = "success" ]; then
              echo "| **Status** | ✅ Success |"
            elif [ "${{ job.status }}" = "cancelled" ]; then
              echo "| **Status** | ⛔ Cancelled |"
            else
              echo "| **Status** | ❌ Failed |"
            fi
            echo "| **Trigger Source** | \`${SOURCE}\` |"
            echo "| **Actor** | \`${{ github.actor }}\` |"
            echo "| **Run Number** | \`${{ github.run_number }}\` (Attempt \`${{ github.run_attempt }}\`) |"
            echo "| **Branch/Ref** | \`${{ github.ref_name }}\` |"
            echo "| **Target SHA** | \`${TARGET_SHA}\` (\`${TARGET_SHA:0:7}\`) |"
            echo "| **Draft Mode** | \`${DRAFT}\` |"
            echo ""

            echo "### 2. Version Decision"
            echo "| Category | Value |"
            echo "|----------|-------|"
            REQ="${{ steps.context.outputs.requested_tag }}"
            if [ -z "$REQ" ]; then
              echo "| **Requested Input** | \`(auto)\` |"
              echo "| **Normalised Input** | N/A |"
            else
              echo "| **Requested Input** | \`${REQ}\` |"
              echo "| **Normalised Input** | \`${{ steps.version.outputs.norm_req }}\` |"
            fi
            echo "| **Highest Published Release** | \`${{ steps.version.outputs.highest_pub }}\` |"
            echo "| **Highest Draft Release** | \`${{ steps.version.outputs.highest_draft }}\` |"
            echo "| **Highest Prerelease** | \`${{ steps.version.outputs.highest_pre }}\` |"
            echo "| **Highest Raw Git Tag** | \`${{ steps.version.outputs.highest_raw }}\` |"
            echo "| **Final Selected Tag** | \`${TAG}\` |"
            echo "| **Version Name** | \`${{ steps.version.outputs.version_name }}\` |"
            echo "| **Version Code** | \`${{ github.run_number }}\` |"
            echo "| **Action Taken** | \`${{ steps.version.outputs.tag_action }}\` |"
            echo "| **Skipped Non-Semver Tags** | \`${{ steps.version.outputs.skipped_tags }}\` |"

            echo ""
            echo "**Decision Explanation:** ${{ steps.version.outputs.tag_note }}"
            if [ "${{ steps.version.outputs.tag_bump_count }}" != "0" ] && [ -n "${{ steps.version.outputs.tag_bump_count }}" ]; then
               echo "- ⚠️ **Collision avoidance:** Bumped patch ${{ steps.version.outputs.tag_bump_count }} time(s)."
            fi
            echo ""

            echo "### 3. Release Result"
            echo "| Resource | Link/Status |"
            echo "|----------|-------------|"
            if [ -n "$RELEASE_URL" ] && [ "$RELEASE_URL" != "(unavailable)" ]; then
              echo "| **Release Page** | [View Release](${RELEASE_URL}) |"
            else
              echo "| **Release Page** | _Unavailable_ |"
            fi
            if [ -n "$TAG_URL" ]; then
              echo "| **Tag Page** | [View Tag](${TAG_URL}) |"
              echo "| **Source Tree** | [View Tree](${TAGGED_TREE_URL}) |"
            fi
            PREV_TAG="${{ steps.notes.outputs.previous_tag_name }}"
            if [ -n "$PREV_TAG" ] && [ "$PREV_TAG" != "none" ]; then
              echo "| **Compare Changes** | [\`${PREV_TAG}...\${TAG}\`]($(_safe_repo_url "${REPO_BASE_URL}/compare/${PREV_TAG}...${TAG}")) |"
              echo "| **Changelog Base** | \`${PREV_TAG}\` (published) |"
            fi
            echo "| **Release Type** | \`Draft: ${DRAFT}\` |"
            echo "| **Release Commit** | \`${TARGET_SHA:0:7}\` |"

            # Simple assumption since we rename it
            APK_NAME=$(basename "${APK_PATH_VAL}")
            if [ -f "${APK_PATH_VAL}" ]; then
                APK_SIZE=$(ls -lh "${APK_PATH_VAL}" | awk '{print $5}')
                echo "| **APK Asset** | \`${APK_NAME}\` (${APK_SIZE}) |"
            else
                echo "| **APK Asset** | \`${APK_NAME}\` (Size unknown) |"
            fi
            echo "| **Asset Replace/Overwrite** | \`true\` |"
            echo ""

            echo "### 4. Build & Signing Result"
            echo "| Check | Result |"
            echo "|-------|--------|"
            if [ "${SIGNING_ENABLED}" = "true" ]; then
              echo "| **Signing** | ✅ Enabled |"
            else
              echo "| **Signing** | ⚠️ Disabled (Unsigned fallback used due to missing secrets) |"
            fi
            echo "| **APK Filename** | \`${APK_NAME}\` |"
            echo "| **APK Path** | \`${APK_PATH_VAL}\` |"

            if [ -f "${APK_PATH_VAL}" ]; then
               SHA256=$(sha256sum "${APK_PATH_VAL}" | awk '{print $1}')
               echo "| **APK SHA-256** | \`${SHA256}\` |"
            fi
            echo ""

            APK_ARTIFACT_URL="${{ steps.apk_upload.outputs.artifact-url }}"
            APK_ARTIFACT_URL="${APK_ARTIFACT_URL:-(unavailable)}"
            [ "$APK_ARTIFACT_URL" != "(unavailable)" ] && APK_ARTIFACT_URL=$(_safe_repo_url "$APK_ARTIFACT_URL")

            echo "### 5. Workflow Artifacts"
            echo "| Artifact | Details |"
            echo "|----------|---------|"
            echo "| **APK Artifact Name** | \`stubio-${TAG}-release\` |"
            if [ -n "$APK_ARTIFACT_URL" ] && [ "$APK_ARTIFACT_URL" != "(unavailable)" ]; then
              echo "| **APK Artifact URL** | [Download APK Artifact](${APK_ARTIFACT_URL}) |"
            else
              echo "| **APK Artifact URL** | _Unavailable_ |"
            fi
            if [ -n "$LINT_URL" ] && [ "$LINT_URL" != "(unavailable)" ]; then
              echo "| **Lint Report URL** | [Download Lint Artifact](${LINT_URL}) |"
            else
              echo "| **Lint Report URL** | _Unavailable_ |"
            fi
            echo "| **Retention** | 30 days |"
            echo "> _Note: Artifact links require GitHub authentication to access._"
            echo ""

            if [ "${{ job.status }}" != "success" ]; then
               echo "### 6. Diagnostics on Failure"
               echo "| Diagnostic | State |"
               echo "|------------|-------|"
               echo "| **Last Resolved Tag** | \`${TAG}\` |"

               TAG_EXISTS=$(git show-ref --verify --quiet "refs/tags/${TAG}" && echo "Yes" || echo "No")
               echo "| **Tag Created Before Failure** | \`${TAG_EXISTS}\` |"

               REL_EXISTS=$(gh release view "${TAG}" >/dev/null 2>&1 && echo "Yes" || echo "No")
               echo "| **Release Created Before Failure** | \`${REL_EXISTS}\` |"

               APK_EXISTS=$([ -f "${APK_PATH_VAL}" ] && echo "Yes" || echo "No")
               echo "| **APK Created Before Failure** | \`${APK_EXISTS}\` |"
               echo ""
               echo "**Next Steps:** Please review the failure logs. If this was a tag collision, you may need to delete conflicting tags/drafts manually, or re-trigger the workflow to compute the next safe version."
            fi
          } >> "$GITHUB_STEP_SUMMARY"
