name: Android CI

on:
  pull_request:
  push:
    branches: [ main ]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Build and validate
        run: |
          chmod +x ./gradlew
          ./gradlew --no-daemon clean :app:lintDebug :app:assembleDebug :app:assembleRelease
